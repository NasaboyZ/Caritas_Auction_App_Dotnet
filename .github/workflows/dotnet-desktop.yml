name: PR Validation & Auto-Merge

on:
  pull_request:
    branches: ["main"]

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest # ubuntu ist schneller und günstiger für diese Checks

    permissions:
      contents: write
      pull-requests: write

    env:
      Solution_Name: carsties.slnx

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # WICHTIG: Gitleaks benötigt die Historie, um die Commits im PR prüfen zu können

      # 1. SECURITY-CHECK: Prüft den PR auf versehentlich eingecheckte Secrets (Passwörter, API-Keys etc.)
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x # An deine .NET Version anpassen

      # 2. SAUBERKEITS-CHECK: Prüft die Formatierung
      - name: Check Code Formatting
        run: dotnet format whitespace --verify-no-changes

      - name: Restore dependencies
        run: dotnet restore ${{ env.Solution_Name }}

      # 3. KOMPILIER-CHECK: Baut das Projekt ohne Warnungen zuzulassen
      - name: Build Solution
        run: dotnet build ${{ env.Solution_Name }} --no-restore -c Release -p:TreatWarningsAsErrors=true

      # 4. TEST-CHECK: Führt alle Unit-Tests aus
      - name: Execute Unit Tests
        run: dotnet test ${{ env.Solution_Name }} --no-build -c Release

      # 5. AUTO-MERGE:
      - name: Auto-Merge Pull Request
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --merge "${{ env.PR_URL }}"
